on:
  push:
    branches: [ "main" ]
    paths:
      - 'resources/js/**'
      - '.github/workflows/frontend_build.yml'
name: Build fronted to staging
jobs:
  build_and_deploy_bc:
    name: Deploy fronted to staging
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [ 25.x ]
    environment: staging
    steps:
      - uses: actions/checkout@v3
        with:
          ref: ${{ github.head_ref }}
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          extensions: mbstring, xml, ctype, iconv, intl, pdo, pdo_mysql, dom, filter, gd, iconv, json, mbstring, pdo
      - name: Install composer dependencies
        run: |
          composer install --no-dev --optimize-autoloader --no-interaction
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v3
        with:
          node-version: ${{ matrix.node-version }}
      - name: Install node packages inside the directory
        run: |
          npm install
      - name: Run build view file
        run: |
          npm run build
      - name: Upload UI build folders to server
        env:
          PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          HOSTNAME: ${{ secrets.SSH_HOST }}
          USER_NAME: ${{ secrets.USER_NAME }}
          PORT_NUMBER: ${{ secrets.PORT_NUMBER }}
        run: |
          echo "$PRIVATE_KEY" > private_key && chmod 600 private_key
          rsync -avz --delete -e "ssh -o StrictHostKeyChecking=no -i private_key -p ${PORT_NUMBER}" public/build/ ${USER_NAME}@${HOSTNAME}:/var/www/my-orders.order-kids.com/public/build
